# default controller 
L_gripper_traj_controller:
  type: position_controllers/JointTrajectoryController
  joints: 
    - L_finger_joint1
  constraints:
    goal_time: 0.5
    stopped_velocity_tolerance: 0.05
    L_finger_joint1: {trajectory: 1, goal: 0.01}

L_gripper_velo_traj_controller:
  type: velocity_controllers/JointTrajectoryController
  joints: 
    - L_finger_joint1
  gains:
    L_finger_joint1: {p: 10, i: 0.1, d: 0.1, i_clamp: 0}
  constraints:
    goal_time: 0.5
    stopped_velocity_tolerance: 0.05
    L_finger_joint1: {trajectory: 1, goal: 0.01}

L_gripper_action_controller:
  type: position_controllers/GripperActionController
  joint: L_finger_joint1
  action_monitor_rate: 20
  goal_tolerance: 0.005
  max_effort: 100
  stall_velocity_threshold: 0.01
  stall_timeout: 0.5

# default controller 
R_gripper_traj_controller:
  type: position_controllers/JointTrajectoryController
  joints: 
    - R_finger_joint1
  constraints:
    goal_time: 0.5
    stopped_velocity_tolerance: 0.05
    R_finger_joint1: {trajectory: 1, goal: 0.01}

R_gripper_velo_traj_controller:
  type: velocity_controllers/JointTrajectoryController
  joints: 
    - R_finger_joint1
  gains:
    R_finger_joint1: {p: 10, i: 0.1, d: 0.1, i_clamp: 0}
  constraints:
    goal_time: 0.5
    stopped_velocity_tolerance: 0.05
    R_finger_joint1: {trajectory: 1, goal: 0.01}

R_gripper_action_controller:
  type: position_controllers/GripperActionController
  joint: R_finger_joint1
  action_monitor_rate: 20
  goal_tolerance: 0.005
  max_effort: 100
  stall_velocity_threshold: 0.01
  stall_timeout: 0.5

# No Pid gains specified error fix
gazebo_ros_control:
  pid_gains:
    L_finger_joint1: {p: 10.0, i: 0.1, d: 0.0, i_clamp: 0.2, antiwindup: false, publish_state: true}
    L_finger_joint2: {p: 10.0, i: 0.1, d: 0.0, i_clamp: 0.2, antiwindup: false, publish_state: true}
    R_finger_joint1: {p: 10.0, i: 0.1, d: 0.0, i_clamp: 0.2, antiwindup: false, publish_state: true}
    R_finger_joint2: {p: 10.0, i: 0.1, d: 0.0, i_clamp: 0.2, antiwindup: false, publish_state: true}
    